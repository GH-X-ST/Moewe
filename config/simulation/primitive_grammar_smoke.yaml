schema_version: 0.1
project_stage: simulation
config_id: primitive_grammar_smoke
status: smoke_example
units:
  length: m
  angle: rad
  velocity: m_s
  time: s
frames:
  world: z_up
  body: x_forward_y_starboard_z_down
command_order: [aileron, elevator, rudder]
grammar:
  family: bank_pitch_dwell_recovery
  operating_point:
    method: deterministic_pseudo_trim
    airspeed_m_s: [7.0]
    flight_path_angle_rad: [0.0]
    altitude_m: [1.0]
    heading_rad: 0.0
    turn_rate_rad_s: 0.0
    command_rad: [0.0, 0.0, 0.0]
    wind_mode: panel
  hold_duration_s: 0.1
  bank_transition:
    target_bank_rad: [-0.2, 0.0, 0.2]
    duration_s: 0.2
  pitch_pulse:
    delta_pitch_rad: [-0.05, 0.0, 0.05]
    duration_s: 0.2
  dwell:
    duration_s: [0.1, 0.2]
  recovery:
    mode: nominal
    duration_s: 0.2
  controller_types: [pd]
entry_condition:
  min_airspeed_m_s: 3.0
  max_airspeed_m_s: 12.0
  min_altitude_m: 0.2
  max_altitude_m: 5.0
  max_abs_bank_rad: 0.8
  max_abs_pitch_rad: 0.8
safety_limits:
  x_min_m: -10.0
  x_max_m: 10.0
  y_min_m: -5.0
  y_max_m: 5.0
  z_min_m: 0.1
  z_max_m: 5.0
  max_abs_bank_rad: 1.0
  max_abs_angle_of_attack_rad: 0.8
  max_abs_command_rad: 0.6
notes:
  - This smoke grammar produces a small deterministic list for interface tests.
  - It is not a dense primitive library or validation result.
