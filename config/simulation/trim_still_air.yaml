schema_version: 0.1
project_stage: simulation
config_id: trim_still_air
status: pseudo_trim_example
units:
  length: m
  angle: rad
  velocity: m_s
  time: s
frames:
  world: z_up
  body: x_forward_y_starboard_z_down
trim:
  method: deterministic_pseudo_trim
  airspeed_m_s: 7.0
  flight_path_angle_rad: 0.0
  vertical_speed_m_s: null
  bank_angle_rad: 0.0
  heading_rad: 0.0
  turn_rate_rad_s: 0.0
  altitude_m: 1.0
  command_rad: [0.0, 0.0, 0.0]
  wind_model: none
  wind_mode: panel
residual_report:
  includes:
    - force_b_n
    - moment_b_n_m
    - acceleration_b_m_s2
    - speed_derivative_m_s2
    - vertical_velocity_error_m_s
    - angular_rate_error_rad_s
notes:
  - This is a deterministic local-control operating point, not a solved nonlinear trim.
  - Residuals must be inspected before using the point for controller claims.
