schema_version: 0.1
project_stage: simulation
status: nausicaa_single_fan_prior
units:
  length: m
  velocity: m_s
  angle: rad
frames:
  query_points: world_z_up
  output_velocity: world_z_up
random_seed: null
model:
  namespace: moewe.sim.updraft.AnnularUpdraft
  equation: w = w0 + a(theta,z) * exp(-((r - r_ring) / delta_ring)^2)
  residual_gp_default: false
fans:
  - fan_id: fan_00
    centre_xy_m: [4.2, 2.4]
    strength_m_s: 3.0
    ring_radius_m: 0.5
    ring_thickness_m: 0.2
    background_m_s: 0.0
    vertical_decay_m: 1.5
    harmonic_cos: []
    harmonic_sin: []
    fluctuation_std_m_s: 0.0
notes:
  - Multiple fans are represented as a sum of per-fan annular contributions.
  - Seeded perturbations are optional and disabled by default.
